url: https://marcusharrisuconn.github.io/mlmr/

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#264653"
    secondary: "#6e7f8d"
    base_font:
      google: Source Sans Pro
    heading_font:
      google: Source Serif 4

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [github]
  components:
    intro:
      text: Get started
      href: articles/getting-started.html
    articles:
      text: Articles
      menu:
      - text: Getting started
        href: articles/getting-started.html
      - text: Equations and reporting
        href: articles/equations-and-reporting.html

home:
  title: mlmr
  description: >
    Open-source mixed-effects and multilevel modeling in R with a guided Shiny
    interface, readable equations, APA-style tables, and reproducible exports.

reference:
- title: Launch the app
  contents:
  - run_mlmr

articles:
- title: Tutorials
  navbar: ~
  contents:
  - getting-started
  - equations-and-reporting
